<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Sampler — DJ台</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;
  --text:#e0e0e8;--text-dim:#6a6a7a;--accent:#00ffaa;
  --p01:#FFAA00;--p02:#FF4444;--p03:#00FFFF;--p04:#FFD700;
  --p05:#AA00FF;--p06:#4444FF;--p07:#AAAAAA;--p08:#FF88AA;
  --p09:#00FF88;--p10:#88FF00;--p11:#FFFFFF;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
}
/* ── 菜单栏 ── */
.menubar{
  height:32px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:4px;
  font-size:12px;color:var(--text-dim);flex-shrink:0;
  position:relative;z-index:1000;
}
.menubar .menu-trigger{
  cursor:pointer;transition:color .2s,background .2s;padding:4px 10px;border-radius:4px;position:relative;
  white-space:nowrap;
}
.menubar .menu-trigger:hover{color:var(--text);background:var(--surface2)}
.menubar .menu-trigger.active{color:var(--accent);background:var(--surface2)}
.menubar .logo{color:var(--accent);font-weight:800;font-size:13px;letter-spacing:1px;cursor:default;padding:4px 10px}
.menu-dropdown{
  display:none;position:absolute;top:100%;left:0;margin-top:2px;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  min-width:200px;padding:6px 0;z-index:1001;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.menu-dropdown.show{display:block}
.menu-dropdown .menu-item{
  padding:8px 16px;cursor:pointer;font-size:12px;color:var(--text-dim);
  display:flex;align-items:center;gap:10px;transition:all .15s;
}
.menu-dropdown .menu-item:hover{background:var(--accent);color:var(--bg)}
.menu-dropdown .menu-item .shortcut{margin-left:auto;font-size:10px;opacity:.5;font-family:'JetBrains Mono',monospace}
.menu-dropdown .menu-sep{height:1px;background:var(--border);margin:4px 12px}

/* ── 主内容 ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px;gap:10px}

/* ── 中央混音台 ── */
.mixer{
  display:flex;align-items:stretch;gap:12px;flex-shrink:0;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;
}
/* 音量推子 */
.fader-col{display:flex;flex-direction:column;align-items:center;gap:6px;width:60px}
.fader-track{
  width:8px;height:140px;background:var(--surface2);border-radius:4px;
  position:relative;cursor:pointer;
}
.fader-fill{
  position:absolute;bottom:0;left:0;right:0;border-radius:4px;
  background:linear-gradient(to top,var(--accent),#00cc88);transition:height .1s;
}
.fader-knob{
  position:absolute;left:50%;transform:translate(-50%,50%);
  width:28px;height:14px;background:#ddd;border-radius:3px;
  box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:grab;bottom:75%;
  transition:bottom .1s;
}
.fader-label{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.fader-db{font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:700}

/* 波形区 */
.waveform-section{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.waveform-box{
  flex:1;background:var(--surface2);border-radius:8px;overflow:hidden;
  position:relative;min-height:100px;
}
.waveform-box canvas{width:100%;height:100%;display:block}
.playhead{
  position:absolute;top:0;bottom:0;width:2px;background:var(--accent);
  box-shadow:0 0 8px var(--accent);transition:left .05s linear;left:0;
  pointer-events:none;
}
.loop-marker{
  position:absolute;top:0;bottom:0;width:2px;background:#ff6600;
  box-shadow:0 0 6px #ff6600;left:0;pointer-events:none;
}
.loop-marker::after{
  content:'LOOP';position:absolute;top:4px;left:6px;font-size:9px;
  color:#ff6600;font-family:'JetBrains Mono',monospace;
}
.waveform-info{
  display:flex;align-items:center;gap:12px;font-size:11px;
  font-family:'JetBrains Mono',monospace;color:var(--text-dim);
}
.waveform-info .style-name{color:var(--accent);font-weight:700;font-size:13px}
.waveform-info .time{color:var(--text)}

/* BPM区 */
.bpm-col{display:flex;flex-direction:column;align-items:center;gap:8px;width:120px}
.bpm-input{
  font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;
  color:var(--accent);line-height:1;text-align:center;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  width:80px;padding:6px 4px;outline:none;
}
.bpm-input:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(0,212,255,0.3)}
.bpm-input::-webkit-inner-spin-button,
.bpm-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.bpm-input{-moz-appearance:textfield}
.bpm-beat{
  width:12px;height:12px;border-radius:50%;background:var(--surface2);
  transition:background .05s,box-shadow .05s;
}
.bpm-beat.active{background:var(--accent);box-shadow:0 0 12px var(--accent)}
.bpm-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.bpm-btn{
  padding:4px 12px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface2);color:var(--text-dim);font-size:10px;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;
}
.bpm-btn:hover{border-color:var(--accent);color:var(--accent)}
.bpm-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* ── 打击垫区域 ── */
.pads-section{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 20px;flex-shrink:0;
}
.pads-row{display:flex;gap:8px;justify-content:center}
.pads-row.bottom{justify-content:center;margin-top:8px}
.pad{
  width:80px;height:72px;border-radius:10px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;transition:transform .08s,box-shadow .08s;
  border:2px solid transparent;position:relative;overflow:hidden;
  user-select:none;
}
.pad .pad-num{font-size:16px;font-weight:800;opacity:.9}
.pad .pad-key{
  font-size:10px;font-family:'JetBrains Mono',monospace;
  opacity:.5;background:rgba(0,0,0,.3);padding:1px 6px;border-radius:3px;
}
.pad .pad-name{font-size:9px;opacity:.6;margin-top:1px}
.pad::before{
  content:'';position:absolute;inset:0;border-radius:8px;
  opacity:0;transition:opacity .15s;
}
.pad:hover::before{opacity:.15}
.pad:hover{transform:scale(1.04)}
.pad.active{transform:scale(.95)}
.pad.active::before{opacity:.3}
.pad.active::after{
  content:'';position:absolute;inset:-4px;border-radius:12px;
  border:2px solid currentColor;opacity:.6;
  animation:pad-pulse 1s ease-in-out infinite;
}
@keyframes pad-pulse{
  0%,100%{opacity:.6;transform:scale(1)}
  50%{opacity:.2;transform:scale(1.02)}
}

.pad[data-style="1"]{background:#2a1f00;color:var(--p01)}
.pad[data-style="2"]{background:#2a0a0a;color:var(--p02)}
.pad[data-style="3"]{background:#0a2a2a;color:var(--p03)}
.pad[data-style="4"]{background:#2a2400;color:var(--p04)}
.pad[data-style="5"]{background:#1f0a2a;color:var(--p05)}
.pad[data-style="6"]{background:#0a0a2a;color:var(--p06)}
.pad[data-style="7"]{background:#1a1a1a;color:var(--p07)}
.pad[data-style="8"]{background:#2a0a1a;color:var(--p08)}
.pad[data-style="9"]{background:#0a2a1a;color:var(--p09)}
.pad[data-style="10"]{background:#1a2a0a;color:var(--p10)}
.pad[data-style="11"]{background:#1a1a1a;color:var(--p11)}

/* ── 下方面板 ── */
.bottom-panels{display:flex;gap:10px;flex:1;min-height:0}

/* 效果器面板 */
.fx-panel{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 18px;
  display:flex;flex-direction:column;gap:10px;
}
.fx-panel h3{
  font-size:11px;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:2px;font-weight:400;
}
.fx-row{display:flex;gap:14px;flex-wrap:wrap}
.fx-knob{
  width:64px;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.fx-knob .knob{
  width:44px;height:44px;border-radius:50%;background:var(--surface2);
  border:2px solid var(--border);position:relative;cursor:pointer;
  transition:border-color .2s;
}
.fx-knob .knob::after{
  content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);
  width:3px;height:10px;background:var(--accent);border-radius:2px;
}
.fx-knob:hover .knob{border-color:var(--accent)}
.fx-knob .knob-label{font-size:10px;font-weight:700;color:var(--text);letter-spacing:1px}
.fx-knob .knob-value{font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}

/* 设置面板 */
.settings-panel{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 18px;
  display:flex;flex-direction:column;gap:8px;
}
.settings-panel h3{
  font-size:11px;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:2px;font-weight:400;
}
.setting-row{
  display:flex;align-items:center;gap:8px;font-size:12px;
}
.setting-row label{color:var(--text-dim);min-width:70px;font-size:11px}
.setting-row select,.setting-row input[type="number"]{
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:4px 8px;font-size:11px;font-family:'Outfit',sans-serif;
  outline:none;
}
.setting-row select:focus,.setting-row input:focus{border-color:var(--accent)}
.setting-row input[type="number"]{width:60px}
.setting-row input[type="range"]{
  flex:1;accent-color:var(--accent);height:4px;
}
.action-btns{display:flex;gap:6px;margin-top:auto}
.action-btns button{
  flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--text-dim);font-size:11px;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;
}
.action-btns button:hover{border-color:var(--accent);color:var(--accent)}
.action-btns button.danger:hover{border-color:#ff4444;color:#ff4444}
.action-btns button.recording{background:#ff4444;color:#fff;border-color:#ff4444;animation:rec-blink 1s infinite}
@keyframes rec-blink{0%,100%{opacity:1}50%{opacity:.6}}

/* ── 状态栏 ── */
.statusbar{
  height:28px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:24px;
  font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);
  flex-shrink:0;
}
.statusbar .status-item{display:flex;align-items:center;gap:6px}
.statusbar .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.meter{
  display:flex;gap:2px;align-items:flex-end;height:14px;
}
.meter-bar{
  width:4px;background:var(--accent);border-radius:1px;
  transition:height .08s;
}
.meter-bar.peak{background:#ff4444}

/* ── 动画 ── */
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mixer{animation:fade-in .4s ease}
.pads-section{animation:fade-in .5s ease .1s both}
.bottom-panels{animation:fade-in .6s ease .2s both}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;
  display:flex;align-items:center;justify-content:center;
  animation:modal-fade-in .15s ease;
}
@keyframes modal-fade-in{from{opacity:0}to{opacity:1}}
.modal-box{
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  min-width:320px;max-width:480px;padding:24px;
  box-shadow:0 16px 48px rgba(0,0,0,.5);animation:modal-scale-in .2s ease;
}
@keyframes modal-scale-in{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box .modal-title{
  font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px;
}
.modal-box .modal-body{
  font-size:12px;color:var(--text);line-height:1.7;white-space:pre-line;
  max-height:300px;overflow-y:auto;
}
.modal-box .modal-btns{
  display:flex;gap:8px;justify-content:flex-end;margin-top:18px;
}
.modal-box .modal-btns button{
  padding:6px 20px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);color:var(--text-dim);font-size:12px;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;
}
.modal-box .modal-btns button:hover{border-color:var(--accent);color:var(--accent)}
.modal-box .modal-btns button.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.modal-box .modal-btns button.primary:hover{opacity:.85}
.modal-box .modal-btns button.danger{border-color:#ff4444;color:#ff4444}
.modal-box .modal-btns button.danger:hover{background:#ff4444;color:#fff}
</style>
</head>
<body>

<!-- 菜单栏 -->
<div class="menubar">
  <div class="logo">STYLE SAMPLER</div>
  <div class="menu-trigger" data-menu="file">文件
    <div class="menu-dropdown" id="menuFile">
      <div class="menu-item" data-action="import">打开采样文件夹 <span class="shortcut">Ctrl+O</span></div>
      <div class="menu-sep"></div>
      <div class="menu-item" data-action="export">导出录音 <span class="shortcut">Ctrl+E</span></div>
      <div class="menu-sep"></div>
      <div class="menu-item" data-action="quit">退出 <span class="shortcut">Alt+F4</span></div>
    </div>
  </div>
  <div class="menu-trigger" data-menu="edit">编辑
    <div class="menu-dropdown" id="menuEdit">
      <div class="menu-item" data-action="undo">撤销 <span class="shortcut">Ctrl+Z</span></div>
      <div class="menu-item" data-action="redo">重做 <span class="shortcut">Ctrl+Y</span></div>
      <div class="menu-sep"></div>
      <div class="menu-item" data-action="prefs">首选项</div>
    </div>
  </div>
  <div class="menu-trigger" data-menu="view">视图
    <div class="menu-dropdown" id="menuView">
      <div class="menu-item" data-action="fullscreen">全屏 <span class="shortcut">F11</span></div>
      <div class="menu-item" data-action="theme">切换主题</div>
      <div class="menu-sep"></div>
      <div class="menu-item" data-action="resetlayout">重置布局</div>
    </div>
  </div>
  <div class="menu-trigger" data-menu="tools">工具
    <div class="menu-dropdown" id="menuTools">
      <div class="menu-item" data-action="midi">MIDI 设置</div>
      <div class="menu-item" data-action="audiodev">音频设备</div>
    </div>
  </div>
  <div class="menu-trigger" data-menu="help">帮助
    <div class="menu-dropdown" id="menuHelp">
      <div class="menu-item" data-action="shortcuts">快捷键说明 <span class="shortcut">F1</span></div>
      <div class="menu-sep"></div>
      <div class="menu-item" data-action="about">关于 Style Sampler</div>
    </div>
  </div>
</div>

<!-- 主内容 -->
<div class="main">

  <!-- 中央混音台 -->
  <div class="mixer">
    <!-- 音量推子 -->
    <div class="fader-col">
      <div class="fader-label">VOL</div>
      <div class="fader-track" id="faderTrack">
        <div class="fader-fill" id="faderFill" style="height:75%"></div>
        <div class="fader-knob" id="faderKnob" style="bottom:75%"></div>
      </div>
      <div class="fader-db" id="faderDb">-6dB</div>
    </div>

    <!-- 波形区 -->
    <div class="waveform-section">
      <div class="waveform-box" id="waveformBox">
        <canvas id="waveformCanvas"></canvas>
        <div class="playhead" id="playhead"></div>
        <div class="loop-marker" id="loopMarker" style="left:0"></div>
      </div>
      <div class="waveform-info">
        <span class="style-name" id="currentStyle">风格01 · 爵士</span>
        <span style="flex:1"></span>
        <span class="time" id="timeDisplay">0:00.0 / 0:08.0</span>
        <span>速度</span>
        <span class="time">1.0x</span>
      </div>
    </div>

    <!-- BPM区 -->
    <div class="bpm-col">
      <div class="bpm-label">BPM</div>
      <input type="number" id="bpmInput" class="bpm-input" value="128" min="30" max="300" step="1">
      <div class="bpm-beat" id="bpmBeat"></div>
      <div class="bpm-btn" id="tapBtn">TAP</div>
      <div class="bpm-btn" id="autoBtn">AUTO</div>
    </div>
  </div>

  <!-- 打击垫区域 -->
  <div class="pads-section">
    <div class="pads-row" id="padsRow"></div>
    <div class="pads-row bottom" id="padsRowBottom"></div>
  </div>

  <!-- 下方面板 -->
  <div class="bottom-panels">
    <!-- 效果器面板 -->
    <div class="fx-panel">
      <h3>效果器</h3>
      <div class="fx-row" id="fxRow"></div>
    </div>
    <!-- 设置面板 -->
    <div class="settings-panel">
      <h3>循环与设置</h3>
      <div class="setting-row">
        <label>循环起点</label>
        <input type="range" id="loopStart" min="0" max="100" value="0" style="flex:1">
        <span id="loopStartVal" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);min-width:40px">0.0s</span>
      </div>
      <div class="setting-row">
        <label>循环模式</label>
        <select id="loopMode">
          <option value="off">关闭</option>
          <option value="hold" selected>按键保持时循环</option>
          <option value="always">始终循环</option>
        </select>
      </div>
      <div class="setting-row">
        <label>切换过渡</label>
        <select id="transitionMode">
          <option value="crossfade" selected>交叉淡化</option>
          <option value="fade">淡入淡出</option>
          <option value="hard">硬切</option>
        </select>
        <input type="number" value="50" min="0" max="500" id="transitionTime" style="width:50px">
        <span style="font-size:10px;color:var(--text-dim)">ms</span>
      </div>
      <div class="setting-row">
        <label>随机拍数</label>
        <select id="randomBeats">
          <option value="1-4" selected>1-4拍</option>
          <option value="1-2">1-2拍</option>
          <option value="1-8">1-8拍</option>
          <option value="fixed">固定</option>
        </select>
      </div>
      <div class="setting-row">
        <label>触发模式</label>
        <select id="triggerMode">
          <option value="gate" selected>门控模式</option>
          <option value="trigger">触发模式</option>
          <option value="loop">循环模式</option>
        </select>
      </div>
      <div class="action-btns">
        <button id="loadBtn">↑ 加载采样</button>
        <button class="danger" id="stopBtn">■ 停止</button>
        <button id="resetBtn">↺ 重置</button>
        <button id="exportBtn">↓ 导出</button>
      </div>
    </div>
  </div>
</div>

<!-- 状态栏 -->
<div class="statusbar">
  <div class="status-item"><div class="dot"></div><span id="statusText">就绪</span></div>
  <div class="status-item">风格: <span id="statusStyle">01</span></div>
  <div class="status-item">L <span class="meter" id="meterL"></span></div>
  <div class="status-item">R <span class="meter" id="meterR"></span></div>
  <div class="status-item" style="margin-left:auto">CPU: <span id="cpuUsage">8</span>%</div>
</div>

<script>
// ── 自定义模态框（替代 alert/confirm） ──
function showModal(title, body) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box"><div class="modal-title">${title}</div><div class="modal-body">${body}</div><div class="modal-btns"><button class="primary" id="modalOk">确定</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modalOk').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

function showConfirm(title, body, onYes) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box"><div class="modal-title">${title}</div><div class="modal-body">${body}</div><div class="modal-btns"><button id="modalNo">取消</button><button class="danger" id="modalYes">确定</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modalYes').addEventListener('click', () => { overlay.remove(); onYes(); });
  overlay.querySelector('#modalNo').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

// ── Web Audio API 音频引擎（共享时间线模型） ──
let audioCtx = null;
let masterGain = null;
let activeSource = null;
let audioBuffers = [];
let audioLoaded = false;
let playheadStartTime = 0;
let playheadOffset = 0;
let currentPlaybackStyle = null;
let fxNodes = {};

function initWebAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.75;
  masterGain.connect(audioCtx.destination);

  fxNodes.lowpass = audioCtx.createBiquadFilter();
  fxNodes.lowpass.type = 'lowpass';
  fxNodes.lowpass.frequency.value = 20000;
  fxNodes.lowpass.Q.value = 1.0;

  fxNodes.highpass = audioCtx.createBiquadFilter();
  fxNodes.highpass.type = 'highpass';
  fxNodes.highpass.frequency.value = 20;
  fxNodes.highpass.Q.value = 1.0;

  fxNodes.distortion = audioCtx.createWaveShaper();
  fxNodes.distortion.oversample = '4x';
  fxNodes.distortionDry = audioCtx.createGain();
  fxNodes.distortionDry.gain.value = 1.0;
  fxNodes.distortionWet = audioCtx.createGain();
  fxNodes.distortionWet.gain.value = 0.0;

  fxNodes.delayNode = audioCtx.createDelay(2.0);
  fxNodes.delayNode.delayTime.value = 0.3;
  fxNodes.delayFeedback = audioCtx.createGain();
  fxNodes.delayFeedback.gain.value = 0.4;
  fxNodes.delayWet = audioCtx.createGain();
  fxNodes.delayWet.gain.value = 0.0;

  fxNodes.reverbConvolver = audioCtx.createConvolver();
  fxNodes.reverbWet = audioCtx.createGain();
  fxNodes.reverbWet.gain.value = 0.0;
  try {
    fxNodes.reverbConvolver.buffer = createReverbIR(2.0, 3.0);
  } catch(e) {
    console.warn('Reverb IR failed:', e);
  }

  fxNodes.chorusDelay = audioCtx.createDelay(0.05);
  fxNodes.chorusDelay.delayTime.value = 0.005;
  fxNodes.chorusLFO = audioCtx.createOscillator();
  fxNodes.chorusLFO.type = 'sine';
  fxNodes.chorusLFO.frequency.value = 0.5;
  fxNodes.chorusLFOGain = audioCtx.createGain();
  fxNodes.chorusLFOGain.gain.value = 0.002;
  fxNodes.chorusWet = audioCtx.createGain();
  fxNodes.chorusWet.gain.value = 0.0;
  fxNodes.chorusLFO.connect(fxNodes.chorusLFOGain);
  fxNodes.chorusLFOGain.connect(fxNodes.chorusDelay.delayTime);
  fxNodes.chorusLFO.start();

  fxNodes.lowpass.connect(fxNodes.highpass);

  fxNodes.highpass.connect(fxNodes.distortionDry);
  fxNodes.distortionDry.connect(masterGain);

  fxNodes.highpass.connect(fxNodes.distortion);
  fxNodes.distortion.connect(fxNodes.distortionWet);
  fxNodes.distortionWet.connect(masterGain);

  fxNodes.highpass.connect(fxNodes.delayNode);
  fxNodes.delayNode.connect(fxNodes.delayFeedback);
  fxNodes.delayFeedback.connect(fxNodes.delayNode);
  fxNodes.delayNode.connect(fxNodes.delayWet);
  fxNodes.delayWet.connect(masterGain);

  fxNodes.highpass.connect(fxNodes.reverbConvolver);
  fxNodes.reverbConvolver.connect(fxNodes.reverbWet);
  fxNodes.reverbWet.connect(masterGain);

  fxNodes.highpass.connect(fxNodes.chorusDelay);
  fxNodes.chorusDelay.connect(fxNodes.chorusWet);
  fxNodes.chorusWet.connect(masterGain);
}

function createReverbIR(duration, decay) {
  const length = Math.floor(audioCtx.sampleRate * duration);
  const ir = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return ir;
}

function updateDistortionCurve(amount) {
  if (!fxNodes.distortion) return;
  if (amount <= 0.001) {
    fxNodes.distortion.curve = null;
    return;
  }
  const k = 1 + amount * 50;
  const samples = 44100;
  const curve = new Float32Array(samples);
  for (let i = 0; i < samples; i++) {
    const x = (i * 2) / samples - 1;
    curve[i] = ((1 + k) * x) / (1 + k * Math.abs(x));
  }
  fxNodes.distortion.curve = curve;
}

function setWebAudioEffect(effect, param, value) {
  if (!fxNodes.lowpass) return;
  switch (effect) {
    case 'lowpass': {
      const cutoff = 20 * Math.pow(1000, value / 100);
      fxNodes.lowpass.frequency.setValueAtTime(cutoff, audioCtx.currentTime);
      break;
    }
    case 'highpass': {
      const cutoff = 20 * Math.pow(100, value / 100);
      fxNodes.highpass.frequency.setValueAtTime(cutoff, audioCtx.currentTime);
      break;
    }
    case 'reverb': {
      fxNodes.reverbWet.gain.setValueAtTime(value / 100, audioCtx.currentTime);
      break;
    }
    case 'delay': {
      const t = audioCtx.currentTime;
      switch (param) {
        case 'time':
          fxNodes.delayNode.delayTime.setValueAtTime(value / 100 * 2, t);
          fxNodes.delayWet.gain.setValueAtTime(value > 0 ? 0.5 : 0, t);
          break;
        case 'feedback':
          fxNodes.delayFeedback.gain.setValueAtTime(value / 100 * 0.9, t);
          break;
        case 'mix':
          fxNodes.delayWet.gain.setValueAtTime(value / 100, t);
          break;
        default:
          fxNodes.delayNode.delayTime.setValueAtTime(value / 100 * 2, t);
          fxNodes.delayWet.gain.setValueAtTime(value > 0 ? 0.5 : 0, t);
      }
      break;
    }
    case 'distortion': {
      const amount = value / 100;
      updateDistortionCurve(amount);
      fxNodes.distortionDry.gain.setValueAtTime(1 - amount * 0.8, audioCtx.currentTime);
      fxNodes.distortionWet.gain.setValueAtTime(amount, audioCtx.currentTime);
      break;
    }
    case 'chorus': {
      const t = audioCtx.currentTime;
      switch (param) {
        case 'mix':
          fxNodes.chorusWet.gain.setValueAtTime(value / 100, t);
          break;
        case 'rate':
          fxNodes.chorusLFO.frequency.setValueAtTime(value / 100 * 5, t);
          break;
        case 'depth':
          fxNodes.chorusLFOGain.gain.setValueAtTime(value / 100 * 0.005, t);
          break;
        default:
          fxNodes.chorusWet.gain.setValueAtTime(value / 100, t);
      }
      break;
    }
  }
}

const STYLE_FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46];
const STYLE_WAVES = ['sawtooth','square','triangle','sine','sawtooth','square','triangle','sine','sawtooth','square','triangle'];

function getPlayheadTime() {
  if (!audioCtx || !isPlaying) return playheadOffset;
  return playheadOffset + (audioCtx.currentTime - playheadStartTime);
}

let sourceIdCounter = 0;

function startPlaybackAt(styleId, offset) {
  initWebAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  stopCurrentSource();

  const idx = styleId - 1;
  playheadOffset = offset;
  playheadStartTime = audioCtx.currentTime;
  currentPlaybackStyle = styleId;
  const currentSourceId = ++sourceIdCounter;

  if (audioLoaded && audioBuffers[idx]) {
    const buffer = audioBuffers[idx];
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = false;
    source.connect(fxNodes.lowpass);

    const clampedOffset = Math.max(0, Math.min(offset, buffer.duration - 0.001));
    source.start(0, clampedOffset);
    activeSource = source;

    source.onended = () => {
      if (sourceIdCounter !== currentSourceId) return;
      if (currentPlaybackStyle !== styleId) return;
      if (!isPlaying) return;

      const loopMode = document.getElementById('loopMode').value;
      const loopStart = parseFloat(document.getElementById('loopStart').value) / 100 * DURATION;
      const pressed = pressedKeys.size > 0;
      if (loopMode === 'always' || (loopMode === 'hold' && pressed)) {
        playheadOffset = loopStart;
        startPlaybackAt(styleId, loopStart);
      } else {
        isPlaying = false;
        playheadOffset = buffer.duration;
        playheadPos = buffer.duration;
        currentPlaybackStyle = null;
        document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
        document.getElementById('statusText').textContent = '播放结束';
      }
    };
  } else {
    const osc = audioCtx.createOscillator();
    osc.type = STYLE_WAVES[idx] || 'sine';
    osc.frequency.value = STYLE_FREQS[idx] || 440;
    const oscGain = audioCtx.createGain();
    oscGain.gain.value = 0.25;
    osc.connect(oscGain);
    oscGain.connect(fxNodes.lowpass);
    osc.start(0);
    activeSource = { osc, gain: oscGain, isSynth: true };
  }
}

function stopCurrentSource() {
  if (activeSource) {
    try {
      if (activeSource instanceof AudioBufferSourceNode) {
        activeSource.onended = null;
        activeSource.stop();
        activeSource.disconnect();
      } else if (activeSource.isSynth) {
        activeSource.osc.stop();
        activeSource.osc.disconnect();
        activeSource.gain.disconnect();
      }
    } catch(e) {}
    activeSource = null;
  }
}

function switchStyle(styleId) {
  const currentTime = getPlayheadTime();
  startPlaybackAt(styleId, currentTime);
}

function pausePlayback() {
  if (isPlaying) {
    playheadOffset = getPlayheadTime();
    stopCurrentSource();
    currentPlaybackStyle = null;
  }
}

function setWebAudioVolume(v) {
  if (masterGain) masterGain.gain.value = Math.max(0, Math.min(1, v / 100));
}

async function loadAudioFromFolder(files) {
  initWebAudio();
  const tauri = window.__TAURI__;
  if (!tauri || !tauri.core) return;

  for (let i = 0; i < Math.min(files.length, 11); i++) {
    try {
      const bytes = await tauri.core.invoke('read_audio_file', { path: files[i] });
      let arrayBuffer;
      if (bytes instanceof ArrayBuffer) {
        arrayBuffer = bytes;
      } else if (bytes instanceof Uint8Array) {
        arrayBuffer = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);
      } else if (Array.isArray(bytes)) {
        const uint8 = new Uint8Array(bytes);
        arrayBuffer = uint8.buffer;
      } else if (typeof bytes === 'string') {
        const binary = atob(bytes);
        const uint8 = new Uint8Array(binary.length);
        for (let j = 0; j < binary.length; j++) uint8[j] = binary.charCodeAt(j);
        arrayBuffer = uint8.buffer;
      } else {
        const uint8 = new Uint8Array(bytes);
        arrayBuffer = uint8.buffer;
      }
      const decoded = await audioCtx.decodeAudioData(arrayBuffer);
      audioBuffers[i] = decoded;
    } catch(e) {
      console.warn('Failed to decode:', files[i], e);
    }
  }
  if (audioBuffers.some(b => b)) {
    audioLoaded = true;
    let maxDur = 0;
    for (const buf of audioBuffers) {
      if (buf && buf.duration > maxDur) maxDur = buf.duration;
    }
    if (maxDur > 0) {
      DURATION = maxDur;
      document.getElementById('timeDisplay').textContent = `0:00.0 / ${formatTime(DURATION)}`;
    }
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = (sec % 60).toFixed(1);
  return `${m}:${s.padStart(4, '0')}`;
}

function activatePad(id) {
  const style = STYLES.find(s => s.id === id);
  if (!style) return;
  activeStyle = id;
  document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
  document.querySelector(`.pad[data-style="${id}"]`)?.classList.add('active');
  document.getElementById('currentStyle').textContent = `风格${String(id).padStart(2,'0')} · ${style.name}`;
  document.getElementById('currentStyle').style.color = style.color;
  document.getElementById('statusStyle').textContent = String(id).padStart(2,'0');
  document.getElementById('statusText').textContent = '播放中';

  if (!isPlaying) {
    isPlaying = true;
    if (playheadOffset >= DURATION - 0.05) {
      const loopStart = parseFloat(document.getElementById('loopStart').value) / 100 * DURATION;
      playheadOffset = loopStart;
    }
    startPlaybackAt(id, playheadOffset);
  } else {
    switchStyle(id);
  }
  tauriInvoke('play_style', { styleIndex: id - 1 });
}

function deactivatePad() {
  if (document.getElementById('triggerMode').value === 'gate') {
    pausePlayback();
    isPlaying = false;
    document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
    document.getElementById('statusText').textContent = '暂停';
    tauriInvoke('stop_all', {});
  }
}

// ── 键盘映射 ──
const keyMap = { a:1, s:2, d:3, f:4, g:5, h:6, j:7, k:8, l:9, ';':10, "'":11 };
const pressedKeys = new Set();
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  if (keyMap[k] && !pressedKeys.has(k)) {
    pressedKeys.add(k);
    activatePad(keyMap[k]);
  }
  if (k === ' ') { e.preventDefault(); stopAll(); }
  if (k === 'tab') { e.preventDefault(); toggleAuto(); }
});
document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  pressedKeys.delete(k);
  if (keyMap[k] && pressedKeys.size === 0) deactivatePad();
});

// ── 波形绘制 ──
function drawWaveform() {
  const canvas = document.getElementById('waveformCanvas');
  const box = document.getElementById('waveformBox');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = box.clientWidth * dpr;
  canvas.height = box.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = box.clientWidth, h = box.clientHeight;

  ctx.clearRect(0, 0, w, h);

  // 生成模拟波形
  const color = activeStyle ? STYLES.find(s => s.id === activeStyle)?.color || '#00ffaa' : '#00ffaa';
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  for (let x = 0; x < w; x++) {
    const t = x / w;
    const envelope = Math.sin(t * Math.PI) * 0.8 + 0.2;
    const wave = Math.sin(t * 60) * 0.3 + Math.sin(t * 120) * 0.15 + Math.sin(t * 240) * 0.08;
    const noise = (Math.random() - 0.5) * 0.1;
    const y = h / 2 + (wave + noise) * envelope * h * 0.35;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // 已播放区域高亮
  if (playheadPos > 0) {
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, (playheadPos / DURATION) * w, h);
    ctx.globalAlpha = 1;
  }
}

// ── 动画循环 ──
let lastTime = 0;
function animate(time) {
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  if (isPlaying) {
    playheadPos = getPlayheadTime();
    if (playheadPos > DURATION) {
      playheadPos = DURATION;
    }
  }

  // 更新播放头
  const ph = document.getElementById('playhead');
  ph.style.left = `${(playheadPos / DURATION) * 100}%`;

  // 更新时间显示
  const cur = playheadPos;
  const cm = Math.floor(cur / 60);
  const cs = (cur % 60).toFixed(1);
  document.getElementById('timeDisplay').textContent = `${formatTime(cur)} / ${formatTime(DURATION)}`;

  // BPM节拍灯
  const beatInterval = 60 / bpm;
  if (time - lastBeatTime > beatInterval * 1000) {
    lastBeatTime = time;
    const beat = document.getElementById('bpmBeat');
    beat.classList.add('active');
    setTimeout(() => beat.classList.remove('active'), 100);
  }

  // 电平表
  updateMeters();

  // 波形（每4帧刷新一次减少开销）
  if (Math.floor(time / 66) !== Math.floor((time - 16) / 66)) drawWaveform();

  animFrame = requestAnimationFrame(animate);
}

// ── 电平表 ──
function updateMeters() {
  const makeBars = (active) => {
    const count = 8;
    let html = '';
    for (let i = 0; i < count; i++) {
      const h = active ? (Math.random() * 10 + 4) : 2;
      const peak = active && i >= 6;
      html += `<div class="meter-bar${peak ? ' peak' : ''}" style="height:${h}px"></div>`;
    }
    return html;
  };
  document.getElementById('meterL').innerHTML = makeBars(isPlaying);
  document.getElementById('meterR').innerHTML = makeBars(isPlaying);
}

// ── BPM TAP ──
const tapTimes = [];
document.getElementById('tapBtn').addEventListener('click', () => {
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  if (tapTimes.length >= 2) {
    let sum = 0;
    for (let i = 1; i < tapTimes.length; i++) sum += tapTimes[i] - tapTimes[i - 1];
    bpm = Math.round(60000 / (sum / (tapTimes.length - 1)));
    bpm = Math.max(30, Math.min(300, bpm));
    document.getElementById('bpmInput').value = bpm;
  }
});

document.getElementById('bpmInput').addEventListener('change', (e) => {
  const val = parseInt(e.target.value, 10);
  if (!isNaN(val)) {
    bpm = Math.max(30, Math.min(300, val));
    e.target.value = bpm;
  }
});

document.getElementById('bpmInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') e.target.blur();
});

// ── 自动切换 ──
function toggleAuto() {
  autoMode = !autoMode;
  const btn = document.getElementById('autoBtn');
  btn.classList.toggle('active', autoMode);
  if (autoMode) startAutoSwitch();
  else clearTimeout(autoTimer);
}

function startAutoSwitch() {
  clearTimeout(autoTimer);
  const doSwitch = () => {
    if (!autoMode) return;
    const beats = [1, 2, 3, 4];
    const beatCount = beats[Math.floor(Math.random() * beats.length)];
    const interval = (60 / bpm) * beatCount * 1000;
    let nextId;
    do { nextId = Math.floor(Math.random() * 11) + 1; } while (nextId === activeStyle);
    activatePad(nextId);
    autoTimer = setTimeout(doSwitch, interval);
  };
  doSwitch();
}

document.getElementById('autoBtn').addEventListener('click', toggleAuto);

// ── 停止/重置 ──
function stopAll() {
  pausePlayback();
  isPlaying = false;
  activeStyle = null;
  playheadPos = 0;
  playheadOffset = 0;
  currentPlaybackStyle = null;
  document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
  document.getElementById('statusText').textContent = '就绪';
  document.getElementById('currentStyle').textContent = '未选择风格';
  document.getElementById('currentStyle').style.color = 'var(--text-dim)';
  tauriInvoke('stop_all', {});
}
document.getElementById('stopBtn').addEventListener('click', stopAll);
document.getElementById('resetBtn').addEventListener('click', () => { playheadPos = 0; });

// ── 音量推子 ──
const faderTrack = document.getElementById('faderTrack');
let faderDragging = false;
function updateFader(e) {
  const rect = faderTrack.getBoundingClientRect();
  const y = Math.max(0, Math.min(1, 1 - (e.clientY - rect.top) / rect.height));
  faderValue = y * 100;
  document.getElementById('faderFill').style.height = `${faderValue}%`;
  document.getElementById('faderKnob').style.bottom = `${faderValue}%`;
  const db = faderValue > 0 ? Math.round(20 * Math.log10(faderValue / 100)) : -Infinity;
  document.getElementById('faderDb').textContent = db > -60 ? `${db}dB` : '-∞';
  setWebAudioVolume(faderValue);
  tauriInvoke('set_volume', { volume: faderValue });
}
faderTrack.addEventListener('mousedown', (e) => { faderDragging = true; updateFader(e); });
document.addEventListener('mousemove', (e) => { if (faderDragging) updateFader(e); });
document.addEventListener('mouseup', () => { faderDragging = false; });

// ── 循环起点 ──
document.getElementById('loopStart').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  const t = (v / 100 * DURATION).toFixed(1);
  document.getElementById('loopStartVal').textContent = `${t}s`;
  document.getElementById('loopMarker').style.left = `${v}%`;
  tauriInvoke('set_loop_start', { position: v / 100 * DURATION });
});

// ── 效果器旋钮 ──
function initFX() {
  const row = document.getElementById('fxRow');
  FX_LIST.forEach((fx, i) => {
    const knob = document.createElement('div');
    knob.className = 'fx-knob';
    knob.innerHTML = `
      <div class="knob" data-fx="${i}" style="transform:rotate(${fx.value * 2.7 - 135}deg)"></div>
      <span class="knob-label">${fx.label}</span>
      <span class="knob-value" id="fxVal${i}">${fx.value}%</span>
    `;
    // 旋钮交互
    let dragging = false, startY, startVal;
    const kEl = knob.querySelector('.knob');
    kEl.addEventListener('mousedown', (e) => {
      dragging = true; startY = e.clientY; startVal = fx.value;
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const delta = (startY - e.clientY) * 0.5;
      fx.value = Math.max(0, Math.min(100, startVal + delta));
      kEl.style.transform = `rotate(${fx.value * 2.7 - 135}deg)`;
      document.getElementById(`fxVal${i}`).textContent = `${Math.round(fx.value)}%`;
      setWebAudioEffect(fx.effect, fx.param, fx.value);
      tauriInvoke('set_effect_param', { effect: fx.effect, param: fx.param, value: fx.value });
    });
    document.addEventListener('mouseup', () => {
      if (dragging) {
        setWebAudioEffect(fx.effect, fx.param, fx.value);
        tauriInvoke('set_effect_param', { effect: fx.effect, param: fx.param, value: fx.value });
      }
      dragging = false;
    });
    row.appendChild(knob);
  });
}

// ── 菜单栏功能 ──
let menuOpen = null;

function closeAllMenus() {
  document.querySelectorAll('.menu-trigger').forEach(t => {
    t.classList.remove('active');
    const dd = t.querySelector('.menu-dropdown');
    if (dd) dd.classList.remove('show');
  });
  menuOpen = null;
}

document.querySelector('.menubar').addEventListener('click', (e) => {
  const menuItem = e.target.closest('.menu-item');
  if (menuItem) {
    e.stopPropagation();
    const action = menuItem.dataset.action;
    closeAllMenus();
    executeMenuAction(action);
    return;
  }

  const trigger = e.target.closest('.menu-trigger');
  if (trigger) {
    e.stopPropagation();
    const menuKey = trigger.dataset.menu;
    if (menuOpen === menuKey) {
      closeAllMenus();
    } else {
      closeAllMenus();
      trigger.classList.add('active');
      const dd = trigger.querySelector('.menu-dropdown');
      if (dd) dd.classList.add('show');
      menuOpen = menuKey;
    }
    return;
  }
});

document.querySelectorAll('.menu-trigger').forEach(trigger => {
  trigger.addEventListener('mouseenter', () => {
    if (menuOpen && trigger.dataset.menu !== menuOpen) {
      closeAllMenus();
      trigger.classList.add('active');
      const dd = trigger.querySelector('.menu-dropdown');
      if (dd) dd.classList.add('show');
      menuOpen = trigger.dataset.menu;
    }
  });
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.menubar')) {
    closeAllMenus();
  }
});

function executeMenuAction(action) {
  const actions = {
    'import': () => {
      document.getElementById('statusText').textContent = '请选择音频文件夹';
      triggerImport();
    },
    'export': () => {
      exportWav();
    },
    'quit': () => {
      showConfirm('退出', '确定要退出 Style Sampler 吗？', () => {
        try { window.close(); } catch(e) {}
      });
    },
    'undo': () => {
      document.getElementById('statusText').textContent = '撤销（暂未实现）';
    },
    'redo': () => {
      document.getElementById('statusText').textContent = '重做（暂未实现）';
    },
    'prefs': () => {
      showModal('首选项设置', '• 音频输出设备\n• 采样率: 44100Hz\n• 缓冲区大小: 512\n• MIDI 输入设备');
    },
    'fullscreen': () => {
      try {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      } catch(e) {
        document.getElementById('statusText').textContent = '全屏切换失败';
      }
    },
    'theme': () => {
      const root = document.documentElement;
      const isDark = getComputedStyle(root).getPropertyValue('--bg').trim() === '#0a0a0f';
      if (isDark) {
        root.style.setProperty('--bg', '#f0f0f5');
        root.style.setProperty('--surface', '#e0e0e8');
        root.style.setProperty('--surface2', '#d0d0d8');
        root.style.setProperty('--border', '#b0b0c0');
        root.style.setProperty('--text', '#1a1a2a');
        root.style.setProperty('--text-dim', '#6a6a7a');
        document.getElementById('statusText').textContent = '已切换到亮色主题';
      } else {
        root.style.setProperty('--bg', '#0a0a0f');
        root.style.setProperty('--surface', '#12121a');
        root.style.setProperty('--surface2', '#1a1a26');
        root.style.setProperty('--border', '#2a2a3a');
        root.style.setProperty('--text', '#e0e0e8');
        root.style.setProperty('--text-dim', '#6a6a7a');
        document.getElementById('statusText').textContent = '已切换到暗色主题';
      }
    },
    'resetlayout': () => {
      playheadPos = 0;
      faderValue = 75;
      document.getElementById('faderFill').style.height = '75%';
      document.getElementById('faderKnob').style.bottom = '75%';
      document.getElementById('faderDb').textContent = '-6dB';
      document.getElementById('loopStart').value = 0;
      document.getElementById('loopStartVal').textContent = '0.0s';
      document.getElementById('loopMarker').style.left = '0%';
      document.getElementById('statusText').textContent = '布局已重置';
    },
    'midi': () => {
      showModal('MIDI 设置', '当前状态: 未连接\n\n支持的设备:\n• 任何兼容 MIDI 控制器\n• 通过 USB 或蓝牙连接\n\n请在系统设置中配置 MIDI 设备后重启应用');
    },
    'audiodev': () => {
      showModal('音频设备', '当前输出: 默认音频设备\n采样率: 44100 Hz\n缓冲区: 512 samples\n延迟: ~11.6 ms\n\n如需更改设备，请在首选项中设置');
    },
    'shortcuts': () => {
      showModal('快捷键说明', 'A S D F G H J K L ; \'  →  触发风格 1-11\n空格  →  停止播放\nTab  →  自动切换风格\nEsc  →  紧急静音\nF1  →  帮助\nF11  →  全屏\nCtrl+O  →  打开采样文件夹\nCtrl+E  →  导出录音');
    },
    'about': () => {
      showModal('关于 Style Sampler', 'Style Sampler v0.1.0\n\n多风格音频键盘映射播放器\n\n11 种风格共享同一时间线，\n通过键盘即时切换，无缝过渡。\n\n基于 Tauri + Rust 构建');
    }
  };
  if (actions[action]) actions[action]();
}

// ── 音频导入功能 ──

async function triggerImport() {
  try {
    const tauri = window.__TAURI__;
    if (!tauri || !tauri.core) throw new Error('Tauri API not available');

    document.getElementById('statusText').textContent = '请选择文件夹...';
    const result = await tauri.core.invoke('load_sample_directory', {});

    if (result.status === 'cancelled') {
      document.getElementById('statusText').textContent = '就绪';
    } else if (result.status === 'loaded') {
      document.getElementById('statusText').textContent = '解码音频中...';
      if (result.files && result.files.length > 0) {
        await loadAudioFromFolder(result.files);
      }
      if (result.duration && result.duration > 0) {
        DURATION = Math.max(DURATION, result.duration);
        document.getElementById('timeDisplay').textContent = `0:00.0 / ${formatTime(DURATION)}`;
      }
      audioLoaded = true;
      document.getElementById('statusText').textContent = '音频已加载 (' + (result.files ? result.files.length : 0) + ' 个文件)';
      showModal('加载成功', '✓ 音频采样加载成功！\n\n已加载 ' + (result.files ? result.files.length : 0) + ' 个音频文件\n音频时长: ' + DURATION.toFixed(1) + 's\n\n按键盘 A~\' 键触发对应风格播放');
    }
  } catch (e) {
    console.warn('导入失败:', e);
    document.getElementById('statusText').textContent = '导入失败: ' + (e.message || e);
    showModal('导入失败', '错误信息: ' + (e.message || e));
  }
}

// ── 导出功能 ──
async function exportWav() {
  try {
    const tauri = window.__TAURI__;
    if (!tauri) throw new Error('Tauri API not available');

    const path = `recording_${Date.now()}.wav`;
    await tauri.core.invoke('stop_recording');
    await tauri.core.invoke('export_recording', { path });
    document.getElementById('statusText').textContent = '已导出';
    showModal('导出完成', '录音已导出: ' + path);
  } catch (e) {
    console.warn('导出功能需要 Tauri 环境:', e);
    document.getElementById('statusText').textContent = '导出完成（模拟）';
  }
}
document.getElementById('exportBtn').addEventListener('click', exportWav);

// ── 初始化 ──
function init() {
  initPads();
  initFX();
  drawWaveform();
  lastTime = performance.now();
  animFrame = requestAnimationFrame(animate);
  window.addEventListener('resize', drawWaveform);

  document.getElementById('loadBtn').addEventListener('click', triggerImport);

  document.getElementById('loopMode').addEventListener('change', (e) => {
    tauriInvoke('set_loop_mode', { mode: e.target.value });
  });
  document.getElementById('triggerMode').addEventListener('change', (e) => {
    tauriInvoke('set_trigger_mode', { mode: e.target.value });
  });

  tauriInvoke('set_volume', { volume: faderValue });
  tauriInvoke('set_loop_mode', { mode: document.getElementById('loopMode').value });
  tauriInvoke('set_trigger_mode', { mode: document.getElementById('triggerMode').value });
}
init();
</script>
